name: 🔐 TruffleHog Secret Scan

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  trufflehog:
    name: TruffleHog Scanning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog OSS Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: >-
            --only-verified
            --fail

      - name: Scan-Zusammenfassung ausgeben
        if: always()
        run: |
          echo "TruffleHog Scan abgeschlossen."
          echo "Ergebnis: ${{ job.status }}"
